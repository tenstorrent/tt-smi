name: Build All
run-name: Build All
permissions:
  contents: read
  actions: write
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        default: ${{ github.ref }}
        required: false
        type: string
      MAJOR:
        required: false
        type: string
      MINOR:
        required: false
        type: string
      PATCH:
        required: false
        type: string
      NUMBER_OF_COMMITS_SINCE_TAG:
        required: false
        type: string

jobs:
  build_all_depends:
    name: Build All the packages!
    runs-on: ubuntu-latest
    steps:
      - run: echo "Ok, so here we go for building *ALL* the packages.  I said *ALL* of them now!"
      - run: |
          echo "What started this ref: ${{ github.ref }}"
          echo "What started this sha: ${{ github.sha }}"
          echo "Did we get a ref pass in? ${{ inputs.ref }}"
  
  # We're not building Debian packages anymore, but leaving this here for reference.
  # builddebian:
  #   needs:
  #     - build_all_depends
  #   name: Build Ubuntu / Debian
  #   uses: ./.github/workflows/build-debian.yml
  #   with:
  #     ref: ${{ inputs.ref }}
  #     MAJOR:  ${{ inputs.MAJOR }}
  #     MINOR:  ${{ inputs.MINOR }}
  #     PATCH:  ${{ inputs.PATCH }}
  #     NUMBER_OF_COMMITS_SINCE_TAG:  ${{ inputs.NUMBER_OF_COMMITS_SINCE_TAG }}
  #   secrets: inherit
  buildpypi:
    needs:
      - build_all_depends
    uses: ./.github/workflows/build-pypi.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit
  buildpyinstaller:
    needs:
      - build_all_depends
      - buildpypi
    name: Build PyInstaller binary
    uses: ./.github/workflows/build-pyinstaller.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

  # Single artifact on this workflow run so you can share one download link (run summary → Artifacts).
  publish_build_artifacts:
    name: Publish combined build artifacts
    needs:
      - buildpypi
      - buildpyinstaller
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: bundles/wheels
      - name: Download PyInstaller binaries (all matrix legs)
        uses: actions/download-artifact@v4
        with:
          pattern: tt-smi-*
          path: bundles/pyinstaller
          merge-multiple: false
      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: tt-smi-build-all
          path: bundles/
      - name: Link to this run (for sharing)
        run: |
          echo "Combined artifact **tt-smi-build-all** is on this workflow run page:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
